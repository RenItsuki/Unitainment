{% extends 'base.html' %}

{% block content %}
<section class="panel section-block">
    <h1>List</h1>
    <p class="section-text">Choose a page to manage your items.</p>

    <div class="bucket-grid">
        {% for section in sections %}
        <a class="bucket-card" href="{% url 'list-status' section.status %}">
            <h2>{{ section.label }}</h2>
            <p>{{ section.description }}</p>
            <span class="meta-text">{{ section.count }} item{{ section.count|pluralize }}</span>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
