{% extends 'base.html' %}

{% block content %}

<h1>Search Media</h1>

<form method="GET" class="search-box">

<input type="text" name="q" placeholder="Search movies, anime, games...">

<button type="submit">Search</button>

</form>

<div class="media-grid">

{% for r in results %}

<div class="card">

<h3>{{ r.title }}</h3>

<p>{{ r.media_type }}</p>

<p>Rating: {{ r.rating }}</p>

</div>

{% endfor %}

</div>

{% endblock %}
